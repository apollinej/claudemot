<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claudemot Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ca-silver: #c8c8d4;
      --ca-chrome-light: #e8e8f0;
      --ca-chrome-mid: #b8b8c8;
      --ca-chrome-dark: #8888a0;
      --ca-iris-1: #c4b5fd;
      --ca-iris-2: #a5b4fc;
      --ca-iris-3: #d8b4fe;
      --ca-iris-4: #93c5fd;
      --ca-accent: #8b5cf6;
      --ca-accent-soft: #a78bfa;
      --ca-chrome-grad: linear-gradient(135deg, #d4d4e0, #c4b5fd, #a5b4fc, #d8b4fe, #e8e8f0);
      --ca-titlebar: linear-gradient(90deg, #a5b4fc, #c4b5fd, #d8b4fe, #93c5fd);
      --ca-glass: rgba(240, 240, 248, 0.92);
      --ca-glass-strong: rgba(245, 245, 252, 0.96);
      --ca-text: #2d2d3d;
      --ca-text-mid: #555570;
      --ca-text-muted: #8888a0;
      --ca-pixel: 'Press Start 2P', monospace;
      --ca-body: 'Orbitron', sans-serif;
      --ca-pixel-border:
        inset -2px -2px 0 0 #9898b0,
        inset 2px 2px 0 0 #f0f0f8,
        inset -4px -4px 0 0 #7878a0,
        inset 4px 4px 0 0 #fafaff;
      --ca-shadow: 0 4px 24px rgba(100, 100, 160, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--ca-body);
      background: var(--ca-chrome-grad);
      background-attachment: fixed;
      color: var(--ca-text);
      min-height: 100vh;
      padding: 32px;
    }

    .settings-window {
      max-width: 560px;
      margin: 0 auto;
      background: var(--ca-glass-strong);
      border: 3px solid var(--ca-accent-soft);
      box-shadow: var(--ca-pixel-border), var(--ca-shadow);
      overflow: hidden;
    }

    .settings-titlebar {
      background: var(--ca-titlebar);
      background-size: 200% 100%;
      animation: ca-shimmer 6s ease-in-out infinite;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--ca-chrome-dark);
    }

    @keyframes ca-shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .settings-titlebar-text {
      font-family: var(--ca-pixel);
      font-size: 11px;
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
      letter-spacing: 0.5px;
    }

    .settings-titlebar-dots {
      display: flex;
      gap: 4px;
    }
    .settings-titlebar-dots span {
      width: 12px;
      height: 12px;
      border: 1.5px solid rgba(0,0,0,0.15);
    }
    .dot-close { background: #ff6b6b; }
    .dot-min { background: #ffd93d; }
    .dot-max { background: #6bff6b; }

    .settings-body {
      padding: 20px;
    }

    .section {
      background: #fff;
      border: 2px solid var(--ca-chrome-mid);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 2px 2px 0 0 rgba(180, 180, 200, 0.2);
    }

    .section h2 {
      font-family: var(--ca-pixel);
      font-size: 11px;
      color: var(--ca-accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px dashed var(--ca-chrome-mid);
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      margin-bottom: 4px;
      font-family: var(--ca-pixel);
      font-size: 11px;
      color: var(--ca-text-mid);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .field input, .field select {
      width: 100%;
      padding: 8px 10px;
      background: #fff;
      border: 2px solid var(--ca-chrome-mid);
      box-shadow: var(--ca-pixel-border);
      color: var(--ca-text);
      font-size: 14px;
      font-family: var(--ca-body);
      outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: var(--ca-accent);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.15);
    }

    .hint {
      font-size: 11px;
      color: var(--ca-text-muted);
      margin-top: 4px;
    }
    .hint a { color: var(--ca-accent); }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }

    .toggle-row label {
      font-size: 14px;
      color: var(--ca-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-checkbox {
      accent-color: var(--ca-accent);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      padding: 8px 18px;
      font-family: var(--ca-pixel);
      font-size: 11px;
      cursor: pointer;
      border: 2px solid var(--ca-chrome-mid);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.1s;
    }

    .btn-save {
      background: linear-gradient(180deg, var(--ca-iris-2), var(--ca-accent));
      color: #fff;
      border-color: #6d5ab5;
      box-shadow: 0 2px 0 0 #5a48a0;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 3px 0 0 #5a48a0; }
    .btn-save:active { transform: translateY(1px); box-shadow: none; }

    .btn-secondary {
      background: var(--ca-glass-strong);
      color: var(--ca-text-mid);
    }
    .btn-secondary:hover { background: var(--ca-chrome-light); color: var(--ca-text); }

    .btn-danger {
      background: #fff0f0;
      color: #dc2626;
      border-color: #fca5a5;
    }
    .btn-danger:hover { background: #fecaca; }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .message {
      padding: 8px 12px;
      margin-top: 12px;
      font-family: var(--ca-body);
      font-size: 12px;
      letter-spacing: 0.3px;
      display: none;
      border: 2px solid;
    }
    .message.success {
      display: block;
      background: #f0fdf4;
      color: #16a34a;
      border-color: #86efac;
    }
    .message.error {
      display: block;
      background: #fff0f0;
      color: #dc2626;
      border-color: #fca5a5;
    }
    .message.info {
      display: block;
      background: #f0f0ff;
      color: var(--ca-accent);
      border-color: var(--ca-iris-1);
    }

    /* --- Connected state --- */
    .connected-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #f0fdf4;
      border: 2px solid #86efac;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .connected-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .connected-status a {
      color: var(--ca-accent);
      text-decoration: none;
    }
    .connected-status a:hover { text-decoration: underline; }

    .db-link {
      display: block;
      font-size: 12px;
      color: var(--ca-text-muted);
      margin-top: 4px;
    }
    .db-link a { color: var(--ca-accent); }

    /* --- Page picker --- */
    .page-picker {
      display: none;
      margin-top: 12px;
    }
    .page-picker.visible { display: block; }

    .page-list {
      max-height: 200px;
      overflow-y: auto;
      border: 2px solid var(--ca-chrome-mid);
      background: #fff;
    }
    .page-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--ca-body);
      border-bottom: 1px solid var(--ca-chrome-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-item:hover { background: #f5f3ff; }
    .page-item:last-child { border-bottom: none; }
    .page-item .page-icon { font-size: 16px; }
    .page-item .page-title { flex: 1; }

    /* --- Spinner --- */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--ca-chrome-mid);
      border-top-color: var(--ca-accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Advanced toggle --- */
    .advanced-toggle {
      font-family: var(--ca-pixel);
      font-size: 10px;
      color: var(--ca-text-muted);
      cursor: pointer;
      margin-top: 12px;
      letter-spacing: 0.3px;
    }
    .advanced-toggle:hover { color: var(--ca-accent); }
    .advanced-fields { display: none; margin-top: 12px; }
    .advanced-fields.visible { display: block; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="settings-window">
    <div class="settings-titlebar">
      <span class="settings-titlebar-text">claudemot settings</span>
      <div class="settings-titlebar-dots">
        <span class="dot-min"></span>
        <span class="dot-max"></span>
        <span class="dot-close"></span>
      </div>
    </div>
    <div class="settings-body">

      <!-- Notion Integration Section -->
      <div class="section">
        <h2>Notion Integration</h2>

        <!-- Connected state -->
        <div id="connectedState" hidden>
          <div class="connected-status">
            <span class="connected-dot"></span>
            <span>connected to notion as <strong id="integrationName"></strong></span>
          </div>
          <span class="db-link" id="dbLinks"></span>
          <div class="btn-row" style="margin-top: 8px;">
            <button class="btn btn-danger" id="disconnect">Disconnect</button>
          </div>
        </div>

        <!-- Disconnected state: API key entry -->
        <div id="disconnectedState">
          <div class="field">
            <label>api key</label>
            <input type="password" id="apiKey" placeholder="ntn_..." />
            <p class="hint">
              1. create at <a href="https://www.notion.so/my-integrations" target="_blank">notion.so/my-integrations</a><br>
              2. share a notion page with your integration<br>
              3. paste the key here and click connect
            </p>
          </div>
          <button class="btn btn-save" id="connect">Connect</button>
        </div>

        <!-- Page picker (shown when no existing databases found) -->
        <div class="page-picker" id="pagePicker">
          <p class="hint" style="margin-bottom: 8px;">
            no existing databases found. pick a page to create them under:
          </p>
          <div class="page-list" id="pageList"></div>
        </div>

        <!-- Status messages -->
        <div class="message" id="notionMessage"></div>

        <!-- Advanced: manual ID entry -->
        <div class="advanced-toggle" id="advancedToggle">&#9654; advanced (manual ids)</div>
        <div class="advanced-fields" id="advancedFields">
          <div class="field">
            <label>sessions database id</label>
            <input type="text" id="sessionsDbId" placeholder="Database ID" />
          </div>
          <div class="field">
            <label>annotations database id</label>
            <input type="text" id="annotationsDbId" placeholder="Database ID" />
          </div>
          <div class="field">
            <label>sessions data source id</label>
            <input type="text" id="sessionsDsId" placeholder="Collection ID" />
          </div>
          <div class="field">
            <label>annotations data source id</label>
            <input type="text" id="annotationsDsId" placeholder="Collection ID" />
          </div>
          <button class="btn btn-secondary" id="saveManual">Save Manual IDs</button>
        </div>
      </div>

      <!-- Defaults Section -->
      <div class="section">
        <h2>Defaults</h2>
        <div class="field">
          <label>default project</label>
          <select id="defaultProject">
            <option value="kyma">kyma</option>
            <option value="personal" selected>personal</option>
            <option value="learning">learning</option>
            <option value="other">other</option>
          </select>
        </div>
        <div class="toggle-row">
          <label>
            <input type="checkbox" class="toggle-checkbox" id="defaultAutoPin" />
            automatically pin new annotations to notion
          </label>
        </div>
        <div class="btn-row">
          <button class="btn btn-save" id="saveDefaults">Save Defaults</button>
        </div>
      </div>

      <div class="message" id="defaultsMessage"></div>
    </div>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>
